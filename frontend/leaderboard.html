<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทำเนียบแรงค์ - Leaderboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Sarabun:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --panel-bg: rgba(18, 20, 25, 0.85);
            --panel-border: #a4915c;
            --text-gold: #e2ce90;
            --btn-bg: linear-gradient(to bottom, #4a4a4a, #202020);
            --btn-border: #8c7a4b;
            --rank-bg: rgba(30, 35, 40, 0.7);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(to bottom, transparent, rgba(5, 10, 15, 0.95)), url('images/leaderboard_hall.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .fog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(226, 206, 144, 0.05) 0%, rgba(5, 10, 15, 0.7) 100%);
            z-index: 1;
            pointer-events: none;
            animation: pulseFog 8s infinite alternate ease-in-out;
        }

        @keyframes pulseFog {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 1;
            }
        }

        .ff-panel {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            border-radius: 4px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(164, 145, 92, 0.1);
        }

        .ff-panel::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--text-gold), transparent);
        }

        .ff-panel::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--text-gold), transparent);
        }

        .header-content {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(164, 145, 92, 0.3);
            padding-bottom: 15px;
        }

        .title {
            font-family: 'Cinzel', serif;
            color: var(--text-gold);
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 1rem;
            color: #a09d94;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Custom Scrollbar */
        .leaderboard-list::-webkit-scrollbar {
            width: 8px;
        }

        .leaderboard-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        .leaderboard-list::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 4px;
        }

        .rank-card {
            display: flex;
            align-items: center;
            background: var(--rank-bg);
            border: 1px solid #404040;
            padding: 10px 15px;
            border-radius: 4px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .rank-card:hover {
            transform: translateX(5px);
            border-color: var(--text-gold);
        }

        .rank-number {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: #a09d94;
            min-width: 40px;
            text-align: center;
        }

        .rank-card:nth-child(1) .rank-number {
            color: #ffd700;
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .rank-card:nth-child(2) .rank-number {
            color: #c0c0c0;
            text-shadow: 0 0 10px rgba(192, 192, 192, 0.5);
        }

        .rank-card:nth-child(3) .rank-number {
            color: #cd7f32;
            text-shadow: 0 0 10px rgba(205, 127, 50, 0.5);
        }

        .rank-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
            margin-left: 10px;
            margin-right: 15px;
            filter: drop-shadow(0px 0px 5px rgba(0, 0, 0, 0.8));
        }

        .rank-details {
            flex-grow: 1;
        }

        .rank-username {
            font-family: 'Sarabun', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 2px;
        }

        .rank-score {
            font-size: 0.9rem;
            color: var(--text-gold);
        }

        .btn-action {
            display: block;
            width: 100%;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--text-gold);
            padding: 12px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            text-shadow: 0 1px 2px #000;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-action:hover {
            background: linear-gradient(to bottom, #5a5a5a, #303030);
            color: #fff;
            border-color: #ffd54f;
            box-shadow: 0 0 10px rgba(164, 145, 92, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="fog-overlay"></div>

    <div class="ff-panel">
        <div class="header-content">
            <h1 class="title">Leaderboard</h1>
            <p class="subtitle">ทำเนียบ 50 อันดับนักผจญภัยยอดเยี่ยม แห่ง Guild</p>
        </div>

        <div class="leaderboard-list" id="leaderboardList">
            <div style="text-align: center; color: #a09d94;">Loading Heroes...</div>
        </div>

        <a href="index.html" class="btn-action">Return to Guild</a>
    </div>

    <script>
        function authHeaders(json = true) {
            const token = localStorage.getItem('token');
            const headers = {};
            if (json) headers['Content-Type'] = 'application/json';
            if (token) headers['Authorization'] = `Bearer ${token}`;
            return headers;
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchLeaderboard();
        });

        async function fetchLeaderboard() {
            const listContainer = document.getElementById('leaderboardList');

            try {
                const response = await fetch('https://project-vocabdb.onrender.com/api/leaderboard', {
                    method: 'GET',
                    headers: authHeaders(false)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    const players = result.data;

                    if (players.length === 0) {
                        listContainer.innerHTML = `<div style="text-align: center; color: #a09d94;">ยังไม่มีข้อมูลนักผจญภัย</div>`;
                        return;
                    }

                    listContainer.innerHTML = '';

                    players.forEach((player, index) => {
                        const rankNameRaw = player.rank || "Bronze";
                        const cleanRankName = rankNameRaw.replace(/[^a-zA-Z]/g, '').toLowerCase().trim();

                        const card = document.createElement('div');
                        card.className = 'rank-card';

                        card.innerHTML = `
                            <div class="rank-number">#${index + 1}</div>
                            <img class="rank-icon" src="images/rank_${cleanRankName}.png" alt="Rank Icon" onerror="this.src='images/rank_bronze.png'">
                            <div class="rank-details">
                                <div class="rank-username">${player.username}</div>
                                <div class="rank-score">Score: ${player.score} <span style="font-size: 0.8rem; color: #aaa;">(${rankNameRaw})</span></div>
                            </div>
                        `;

                        listContainer.appendChild(card);
                    });
                } else {
                    listContainer.innerHTML = `<div style="text-align: center; color: #ff5252;">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>`;
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                listContainer.innerHTML = `<div style="text-align: center; color: #ff5252;">เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาลองใหม่ในภายหลัง</div>`;
            }
        }
    </script>
</body>

</html>
