<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กระเป๋าสัมภาระ - Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Sarabun:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --panel-bg: rgba(18, 20, 25, 0.9);
            --panel-border: #a4915c;
            --text-gold: #e2ce90;
            --text-main: #dfdeda;
            --btn-bg: linear-gradient(to bottom, #4a4a4a, #202020);
            --btn-border: #8c7a4b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(to bottom, transparent, rgba(5, 10, 15, 0.95)), url('images/inventory_treasury.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .fog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(226, 206, 144, 0.05) 0%, rgba(5, 10, 15, 0.7) 100%);
            z-index: 1;
            pointer-events: none;
            animation: pulseFog 8s infinite alternate ease-in-out;
        }

        @keyframes pulseFog {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 1;
            }
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-gold);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            z-index: 20;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border: 1px solid var(--panel-border);
        }

        .back-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
        }

        .ff-panel {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            border-radius: 4px;
            padding: 35px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(164, 145, 92, 0.1);
        }

        .ff-panel::before,
        .ff-panel::after {
            content: '';
            position: absolute;
            height: 2px;
            left: 10%;
            right: 10%;
            background: linear-gradient(90deg, transparent, var(--text-gold), transparent);
        }

        .ff-panel::before {
            top: -4px;
        }

        .ff-panel::after {
            bottom: -4px;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-logo h1 {
            font-family: 'Cinzel', serif;
            color: var(--text-gold);
            font-size: 1.5rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
        }

        .search-box {
            width: 100%;
            background: rgba(5, 7, 10, 0.6);
            border: 1px solid #404040;
            padding: 10px 15px;
            color: #fff;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
            border-radius: 2px;
        }

        .search-box:focus {
            border-color: #64b5f6;
        }

        .table-wrapper {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #404040;
            background: rgba(0, 0, 0, 0.4);
        }

        /* Scrollbar */
        .table-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: #111;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: linear-gradient(to bottom, #2a2a2a, #111);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        th {
            padding: 10px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--text-gold);
            border-bottom: 1px solid var(--panel-border);
        }

        td {
            padding: 12px 10px;
            font-size: 1rem;
            border-bottom: 1px dashed #333;
            color: #ccc;
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .col-vocab {
            font-weight: 500;
            color: #fff;
        }

        .tag-type {
            font-size: 0.7rem;
            border: 1px solid #555;
            padding: 2px 4px;
            background: #111;
            border-radius: 2px;
            margin-left: 5px;
            vertical-align: middle;
        }

        .note-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed #555;
            color: #ccc;
            font-family: 'Sarabun', sans-serif;
            font-size: 0.9rem;
            padding: 6px;
            border-radius: 2px;
            outline: none;
            transition: all 0.2s;
        }

        .note-box:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: #e2ce90;
            color: #fff;
        }

        .tag-type {
            font-size: 0.8rem;
            border: 1px solid #555;
            padding: 2px 6px;
            background: #111;
            border-radius: 2px;
        }

        .btn-toss {
            background: rgba(255, 82, 82, 0.1);
            color: #ff5252;
            border: 1px solid #ff5252;
            padding: 4px 10px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-toss:hover {
            background: #ff5252;
            color: #fff;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(164, 145, 92, 0.1);
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            color: #ff5252;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .modal-desc {
            color: #ccc;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .btn-modal {
            flex: 1;
            padding: 12px;
            background: #222;
            border: 1px solid #555;
            color: #fff;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-modal:hover {
            background: #333;
        }

        .btn-modal.confirm {
            border-color: #ff5252;
            color: #ff5252;
        }

        .btn-modal.confirm:hover {
            background: #b71c1c;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="fog-overlay"></div>
    <a href="index.html" class="back-btn">◀ Guild</a>

    <div class="ff-panel">
        <div class="brand-logo">
            <h1>Inventory</h1>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="Search Item (ค้นหาคำศัพท์)...">

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th width="25%">Item Name</th>
                        <th width="30%">Effect (ความหมาย)</th>
                        <th width="30%">Note</th>
                        <th width="15%" style="text-align: center;">Action</th>
                    </tr>
                </thead>
                <tbody id="dict-body">
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="tossModal">
        <div class="modal-content">
            <h2 class="modal-title">Delete Item</h2>
            <p class="modal-desc" id="tossDesc">คุณต้องการลบไอเทมนี้ใช่หรือไม่?</p>
            <div class="modal-actions">
                <button class="btn-modal" onclick="closeTossModal()">Cancel (ยกเลิก)</button>
                <button class="btn-modal confirm" onclick="confirmToss()">Delete (ลบเลย)</button>
            </div>
        </div>
    </div>

    <script>
        let myWords = [];
        const tableBody = document.getElementById('dict-body');
        const searchInput = document.getElementById('searchInput');

        document.addEventListener('DOMContentLoaded', () => {
            const username = localStorage.getItem('username');
            if (!username) {
                alert('กรุณาเข้าสู่ระบบก่อนครับ');
                window.location.href = 'login.html';
                return;
            }

            fetch(`http://127.0.0.1:5001/api/mydict/${username}`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        myWords = data.data;
                        renderTable(myWords);
                    } else {
                        alert(data.message);
                    }
                })
                .catch(error => console.error('Error fetching dict:', error));
        });

        function renderTable(data) {
            tableBody.innerHTML = "";

            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 20px; color: #777;">( Inventory is Empty )</td></tr>`;
                return;
            }

            data.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="col-vocab">
                        ${item.vocab} 
                        <span class="tag-type">${item.type ? item.type.toUpperCase() : 'VOCAB'}</span>
                    </td>
                    <td>${item.meaning}</td>
                    <td>
                        <input type="text" class="note-box" value="${item.note || ''}" placeholder="Add note... (บันทึกส่วนตัว)" onblur="saveNote('${item.id}', this.value)" />
                    </td>
                    <td style="text-align: center;">
                        <button class="btn-toss" onclick="deleteWord('${item.id}', '${item.vocab}')">Delete</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        searchInput.addEventListener('keyup', () => {
            const searchString = searchInput.value.toLowerCase();
            renderTable(myWords.filter(item =>
                item.vocab.toLowerCase().includes(searchString) || item.meaning.includes(searchString)
            ));
        });

        let currentTossId = null;
        let currentTossWord = "";

        const tossModal = document.getElementById('tossModal');
        const tossDesc = document.getElementById('tossDesc');

        function deleteWord(wordId, wordText) {
            currentTossId = wordId;
            currentTossWord = wordText;
            tossDesc.innerText = `Do you really want to delete [${wordText}]?`;
            tossModal.classList.add('active');
        }

        function closeTossModal() {
            tossModal.classList.remove('active');
            currentTossId = null;
            currentTossWord = "";
        }

        function confirmToss() {
            if (!currentTossId) return;

            fetch(`http://127.0.0.1:5001/api/mydict/${currentTossId}`, {
                method: 'DELETE'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        myWords = myWords.filter(item => item.id != currentTossId);
                        const searchString = searchInput.value.toLowerCase();
                        renderTable(myWords.filter(item =>
                            item.vocab.toLowerCase().includes(searchString) || item.meaning.includes(searchString)
                        ));
                        closeTossModal();
                    } else {
                        alert(data.message);
                        closeTossModal();
                    }
                })
                .catch(error => {
                    console.error('Error deleting word:', error);
                    alert("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้");
                    closeTossModal();
                });
        }

        function saveNote(wordId, noteText) {
            fetch(`http://127.0.0.1:5001/api/save_note/${wordId}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ note: noteText })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        console.log("Note saved:", noteText);
                        const item = myWords.find(w => w.id === wordId);
                        if (item) item.note = noteText;
                    } else {
                        console.error("Failed to save note:", data.message);
                    }
                })
                .catch(error => {
                    console.error('Error saving note:', error);
                });
        }
    </script>
</body>

</html>
