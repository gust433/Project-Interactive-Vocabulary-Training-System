<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play - เกมทายศัพท์</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- ตั้งค่าสีและฟอนต์ธีมเดิม --- */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --correct-gradient: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
            --wrong-gradient: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            --bg-color: #f3f4f6;
            --text-dark: #2d3748;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(102, 126, 234, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(252, 96, 118, 0.1) 0%, transparent 20%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            overflow: hidden;
        }

        /* ปุ่มย้อนกลับ (ใช้เป็นแถบเวลาแทนในหน้านี้) */
        .timer-board {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 800;
            color: #ff416c;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        /* แถบคะแนนด้านบน */
        .score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 800;
            color: #764ba2;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            font-size: 1.2rem;
        }

        /* การ์ดคำถาม */
        .game-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.5s ease-out;
        }

        .question-number {
            font-size: 0.9rem;
            color: #718096;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .vocab-word {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0 0 30px 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ปุ่มตัวเลือก 4 ข้อ */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .option-btn:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }

        /* สีตอนตอบถูก / ผิด */
        .option-btn.correct {
            background: var(--correct-gradient);
            color: white;
            border-color: transparent;
            transform: scale(1.05);
        }

        .option-btn.wrong {
            background: var(--wrong-gradient);
            color: white;
            border-color: transparent;
            animation: shake 0.4s;
        }

        /* --- Custom Popup --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 300px;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ff4b2b;
            margin: 0 0 10px 0;
        }

        .modal-answer {
            font-size: 1.2rem;
            font-weight: 600;
            color: #00b09b;
            margin-bottom: 20px;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }

        .modal-btn:hover {
            transform: scale(1.05);
        }

        .btn-save {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-skip {
            background: #e2e8f0;
            color: var(--text-dark);
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>

<body>

    <div class="timer-board">⏱️ Time: <span id="time">6</span>s</div>

    <div class="score-board">🔥 Score: <span id="score">0</span></div>

    <div class="game-card">
        <div class="question-number" id="q-number">Question 1 / 10</div>
        <h1 class="vocab-word" id="word-display">Loading...</h1>

        <div class="options-grid" id="options-container">
        </div>
    </div>

    <div class="modal-overlay" id="wrongModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modal-title-text">Oops! ผิดอ่ะ 🥺</h2>
            <p>คำแปลที่ถูกต้องคือ:</p>
            <div class="modal-answer" id="correct-answer-display">...</div>
            <p style="font-size: 0.9rem; color: #718096;">อยากเก็บคำนี้ไว้ทบทวนไหม?</p>

            <button class="modal-btn btn-save" onclick="saveToDict()">💾 เก็บเข้า My Dict</button>
            <button class="modal-btn btn-skip" onclick="nextQuestion()">➡️ ข้ามไปข้อต่อไป</button>
        </div>
    </div>

    <script>
        let score = 0;
        let count = 0;
        let correctAnswer = "";

        // ตัวแปรสำหรับจับเวลา
        let timeLeft = 6;
        let timerInterval;

        const wordDisplay = document.getElementById('word-display');
        const optionsContainer = document.getElementById('options-container');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const wrongModal = document.getElementById('wrongModal');
        const correctAnswerDisplay = document.getElementById('correct-answer-display');
        const modalTitleText = document.getElementById('modal-title-text');

        // ฟังก์ชันเริ่มจับเวลา
        function startTimer() {
            timeLeft = 6;
            timeDisplay.innerText = timeLeft;
            clearInterval(timerInterval); // เคลียร์เวลาเก่าทิ้งก่อนเริ่มใหม่
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timeDisplay.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout(); // เรียกฟังก์ชันเมื่อหมดเวลา
                }
            }, 1000);
        }

        // ฟังก์ชันเมื่อหมดเวลา 6 วิ
        function handleTimeout() {
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(b => b.style.pointerEvents = 'none'); // ล็อกปุ่ม
            
            modalTitleText.innerText = "หมดเวลา! ⏱️"; // เปลี่ยนข้อความใน Popup
            correctAnswerDisplay.innerText = correctAnswer;
            wrongModal.classList.add('active');
        }

        async function loadQuestion() {
            if (count >= 10) {
                clearInterval(timerInterval); // หยุดเวลาตอนจบเกม
                alert(`🎮 จบเกม! คะแนนรวมของคุณคือ ${score} คะแนน`);
                sendScoreToBackend(score);
                return;
            }
            count++;
            
            const qNumberElem = document.getElementById('q-number');
            if (qNumberElem) {
                qNumberElem.innerText = `Question ${count} / 10`;
            }

            try {
                const res = await fetch("http://127.0.0.1:5001/api/get_word");
                const data = await res.json();

                wordDisplay.innerText = data.word;
                correctAnswer = data.answer;

                optionsContainer.innerHTML = "";

                data.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;

                    btn.onclick = () => checkAnswer(btn, opt);

                    optionsContainer.appendChild(btn);
                });

                // เริ่มจับเวลาเมื่อโหลดตัวเลือกเสร็จ
                startTimer();
                
            } catch (error) {
                console.error("Error loading question:", error);
                wordDisplay.innerText = "Error loading...";
            }
        }

        function checkAnswer(btnElement, selectedText) {
            clearInterval(timerInterval); // หยุดเวลาเมื่อมีการคลิกตอบ

            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(b => b.style.pointerEvents = 'none');

            if (selectedText === correctAnswer) {
                btnElement.classList.add('correct');
                score += 10;
                scoreDisplay.innerText = score;
                setTimeout(loadQuestion, 1000);
            } else {
                btnElement.classList.add('wrong');
                setTimeout(() => {
                    modalTitleText.innerText = "Oops! ผิดอ่ะ 🥺"; // เซตข้อความกลับเป็นตอบผิด
                    correctAnswerDisplay.innerText = correctAnswer;
                    wrongModal.classList.add('active');
                }, 500);
            }
        }

        function nextQuestion() {
            wrongModal.classList.remove('active');
            loadQuestion();
        }

        async function saveToDict() {
            const username = localStorage.getItem('username');

            if (!username) {
                alert("เกิดข้อผิดพลาด: ไม่พบชื่อผู้ใช้ กรุณาล็อกอินใหม่");
                window.location.href = "login.html";
                return;
            }

            try {
                const response = await fetch("http://localhost:5001/api/save_word", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        vocab: wordDisplay.innerText,
                        meaning: correctAnswer
                    })
                });

                const data = await response.json();

                if (data.status === "success") {
                    alert("✅ คำศัพท์ถูกบันทึกลง My Dict แล้ว!");
                } else {
                    alert("❌ " + data.message);
                }

            } catch (error) {
                console.error(error);
                alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
            }

            nextQuestion();
        }

        async function sendScoreToBackend(finalScore) {
            const username = localStorage.getItem('username');

            if (!username) {
                alert("เกิดข้อผิดพลาด: ไม่พบชื่อผู้ใช้ กรุณาล็อกอินใหม่");
                window.location.href = "login.html";
                return;
            }

            try {
                const response = await fetch("http://127.0.0.1:5001/api/update_score", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        score: finalScore
                    })
                });

                const result = await response.json();

                if (result.status === "success") {
                    alert(`🎮 จบเกม!\nคุณได้คะแนนรอบนี้: +${finalScore}\n⭐ คะแนนรวมทั้งหมด: ${result.new_total_score}\n🏆 Rank ปัจจุบัน: ${result.new_rank}`);
                } else {
                    alert("เล่นจบแล้ว แต่บันทึกคะแนนไม่สำเร็จ: " + result.message);
                }
            } catch (error) {
                console.error("Error updating score:", error);
                alert("เล่นจบแล้ว แต่ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์เพื่อบันทึกคะแนนได้");
            } finally {
                window.location.href = "index.html";
            }
        }
        
        // เริ่มเกม
        loadQuestion();
    </script>

</body>

</html>
