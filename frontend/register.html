<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนนักผจญภัย - Guild</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Sarabun:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --panel-bg: rgba(18, 20, 25, 0.85);
            --panel-border: #a4915c;
            --text-gold: #e2ce90;
            --text-main: #dfdeda;
            --input-bg: rgba(5, 7, 10, 0.6);
            --focus-glow: #64b5f6;
            --btn-bg: linear-gradient(to bottom, #4a4a4a, #202020);
            --btn-border: #8c7a4b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(to bottom, transparent, rgba(5, 10, 15, 0.95)), url('images/guild_entrance.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* เอฟเฟกต์หมอกบางๆ พื้นหลังให้ดูขลังๆ */
        .fog-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(226, 206, 144, 0.05) 0%, rgba(5, 10, 15, 0.7) 100%);
            z-index: 1;
            pointer-events: none;
            animation: pulseFog 8s infinite alternate ease-in-out;
        }

        @keyframes pulseFog {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 1;
            }
        }

        .ff-panel {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            border-radius: 4px;
            padding: 35px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(164, 145, 92, 0.1);
        }

        /* ตกแต่งกรอบสไตล์เกม MMORPG หรูหรา */
        .ff-panel::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--text-gold), transparent);
        }

        .ff-panel::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--text-gold), transparent);
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-logo h1 {
            font-family: 'Cinzel', serif;
            color: var(--text-gold);
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .brand-logo p {
            font-size: 0.85rem;
            color: #a09d94;
            letter-spacing: 1px;
        }

        .form-row {
            margin-bottom: 20px;
        }

        .form-row label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-gold);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ff-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #404040;
            padding: 12px 15px;
            color: #fff;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
            border-radius: 2px;
        }

        .ff-input:focus {
            border-color: var(--focus-glow);
            box-shadow: 0 0 8px rgba(100, 181, 246, 0.4);
            background: rgba(10, 15, 20, 0.8);
        }

        .ff-input::placeholder {
            color: #555;
        }

        .system-msg {
            font-size: 0.85rem;
            color: #ff5252;
            text-align: center;
            min-height: 20px;
            margin-bottom: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .system-msg.show {
            opacity: 1;
        }

        .btn-action {
            width: 100%;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--text-gold);
            padding: 12px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            text-shadow: 0 1px 2px #000;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn-action:hover {
            background: linear-gradient(to bottom, #5a5a5a, #303030);
            color: #fff;
            border-color: #ffd54f;
            box-shadow: 0 0 10px rgba(164, 145, 92, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-action:active {
            transform: translateY(1px);
        }

        .nav-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .nav-link a {
            color: var(--text-gold);
            text-decoration: none;
            transition: color 0.2s;
            border-bottom: 1px dashed var(--text-gold);
            padding-bottom: 2px;
        }

        .nav-link a:hover {
            color: #fff;
            border-bottom-color: #fff;
        }
    </style>
</head>

<body>

    <div class="fog-overlay"></div>

    <div class="ff-panel">
        <div class="brand-logo">
            <h1>Create Adventurer</h1>
            <p>ลงนามประวัติเพื่อเริ่มต้นการเดินทาง</p>
        </div>

        <form id="registerForm">
            <div class="form-row">
                <label for="username">Name (ชื่อตัวละคร)</label>
                <input type="text" id="username" name="username" class="ff-input" placeholder="กรอกชื่อตัวละครของคุณ..."
                    required autocomplete="off">
            </div>

            <div class="form-row">
                <label for="email">Contact (อีเมลติดต่อ)</label>
                <input type="email" id="email" name="email" class="ff-input" placeholder="กรอกอีเมล..." required
                    autocomplete="off">
            </div>

            <div class="form-row">
                <label for="password">Password (รหัสผ่าน)</label>
                <input type="password" id="password" name="password" class="ff-input"
                    placeholder="ความยาวอย่างน้อย 6 ตัวอักษร" required>
            </div>

            <div class="form-row">
                <label for="confirmPassword">Confirm Password (ยืนยันรหัสผ่าน)</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="ff-input"
                    placeholder="ยืนยันรหัสผ่านอีกครั้ง" required>
            </div>

            <div id="systemMessage" class="system-msg">
                รหัสผ่านไม่ตรงกัน
            </div>

            <button type="submit" class="btn-action" id="submitBtn">
                Register (ลงทะเบียน)
            </button>
        </form>

        <div class="nav-link">
            มีตัวละครอยู่แล้ว? <a href="login.html">Login (เข้าสู่ระบบ)</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const sysMsg = document.getElementById('systemMessage');
        const btnSubmit = document.getElementById('submitBtn');

        form.addEventListener('submit', function (event) {
            event.preventDefault();

            btnSubmit.innerHTML = "Processing...";
            btnSubmit.disabled = true;

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            sysMsg.classList.remove('show');

            if (password !== confirmPassword) {
                setTimeout(() => {
                    sysMsg.innerHTML = "System Error: รหัสผ่านไม่ตรงกัน";
                    sysMsg.classList.add('show');
                    btnSubmit.innerHTML = "Register (ลงทะเบียน)";
                    btnSubmit.disabled = false;
                }, 300);
                return;
            }

            if (password.length < 6) {
                setTimeout(() => {
                    sysMsg.innerHTML = "System Error: รหัสผ่านต้องมีความยาวอย่างน้อย 6 ตัวอักษร";
                    sysMsg.classList.add('show');
                    btnSubmit.innerHTML = "Register (ลงทะเบียน)";
                    btnSubmit.disabled = false;
                }, 300);
                return;
            }

            const formData = new FormData(form);
            const jsonData = Object.fromEntries(formData);

            fetch('https://project-vocabdb.onrender.com/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(jsonData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // กรณีสำเร็จ (โค้ดอัพเดตให้ล็อกอินอัตโนมัติ)
                    btnSubmit.innerHTML = "Registration Complete";
                    btnSubmit.style.borderColor = "#69f0ae";
                    btnSubmit.style.color = "#69f0ae";
                    localStorage.setItem('username', data.username);
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                    }
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1200);
                } else {
                 
                    let errorMessage = data.message; 
                    
                    if (errorMessage.toLowerCase().includes('email') || errorMessage.toLowerCase().includes('duplicate') || errorMessage.includes('ซ้ำ')) {
                        sysMsg.innerHTML = "System Error: อีเมลนี้ถูกลงทะเบียนไปแล้วครับ";
                    } else {
                        // ถ้าเป็น Error อื่นๆ ก็โชว์ข้อความจาก Server ตามปกติ
                        sysMsg.innerHTML = "System Error: " + errorMessage;
                    }

                    sysMsg.classList.add('show');
                    btnSubmit.innerHTML = "Register (ลงทะเบียน)";
                    btnSubmit.disabled = false;
                }
            })
            .catch(error => {
                // กรณีเน็ตหลุด หรือ Server ปิด (โค้ดเดิมของคุณ)
                sysMsg.innerHTML = "Network Error: ขาดการเชื่อมต่อกับเซิร์ฟเวอร์";
                sysMsg.classList.add('show');
                btnSubmit.innerHTML = "Register (ลงทะเบียน)";
                btnSubmit.disabled = false;
            });
        });
    </script>
</body>

</html>
