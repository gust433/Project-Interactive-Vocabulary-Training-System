<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - เกมทายศัพท์</title>
    <style>
        /* จัดวางให้อยู่กึ่งกลางหน้าจอและกำหนดพื้นหลัง */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* ตกแต่งกล่อง Login */
        .login-box {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .login-box h2 {
            margin-top: 0;
            color: #333;
            margin-bottom: 1.5rem;
        }

        /* ตกแต่งช่องกรอกข้อมูล */
        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .input-group input:focus {
            border-color: #4CAF50;
            outline: none;
        }

        /* ตกแต่งปุ่มกด */
        button {
            width: 100%;
            padding: 0.8rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        .register-link {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #777;
        }

        .register-link a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .my-btn:hover {
        background-color: #45a049; /* สีเวลาเอาเมาส์ไปชี้ */
        }   
    </style>
</head>
<body>

    <div class="login-box">
        <h2>เข้าสู่ระบบ<br>🎮 เกมทายศัพท์</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้ (Username)</label>
                <input type="text" id="username" name="username" placeholder="กรอกชื่อผู้ใช้ของคุณ" required>
            </div>
            
            <div class="input-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" name="password" placeholder="กรอกรหัสผ่าน" required>
            </div>
            
            <button type="submit">Play!</button>
        </form>

        <div class="register-link">
            ยังไม่มีบัญชีใช่ไหม? <a href="register.html">สมัครสมาชิกที่นี่</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // ป้องกันหน้าเว็บรีเฟรช

            // 1. ดึงข้อมูล Username และ Password จากฟอร์ม
            const formElement = document.getElementById('loginForm');
            const formData = new FormData(formElement);

            // 2. ส่งข้อมูลไปให้ Backend ตรวจสอบ
            fetch('http://localhost:5001/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(Object.fromEntries(formData))
            })
            .then(response => response.json())
            .then(data => {
                // 3. เช็คสถานะที่ Backend ส่งกลับมา
                if (data.status === 'success') {
                    // 🎉 ล็อกอินสำเร็จ! 
                    // เก็บชื่อผู้ใช้ลงใน LocalStorage ก่อน
                    localStorage.setItem('username', data.username);
                    
                    // สั่งให้เบราว์เซอร์พาไปหน้าหลักด้วยตัวเอง
                    window.location.href = 'index.html'; 
                } else {
                    // ❌ ล็อกอินไม่สำเร็จ (รหัสผิด / ไม่มีชื่อนี้) แจ้งเตือนข้อความ
                    alert(data.message); 
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาลองใหม่ภายหลัง');
            });
        });
    </script>
    
</body>
</html>
