<!DOCTYPE html>
<html>
<head>
    <title>InstaNoSQL</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .post { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .comment { background: #f9f9f9; padding: 5px; margin: 5px 0; font-size: 0.9em; }
        .nav { margin-bottom: 20px; }
        input, button { padding: 8px; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="nav">
        {% if current_user %}
            Logged in as: <b><a href="{{ url_for('profile', username=current_user) }}">{{ current_user }}</a></b> | 
            <a href="{{ url_for('index') }}">index</a> | 
            <a href="{{ url_for('profile', username=current_user) }}">My Profile</a> | 
            <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}">Login</a> | <a href="{{ url_for('register') }}">Register</a>
        {% endif %}
    </div>
    
    {% block content %}{% endblock %}
</body>
</html>
